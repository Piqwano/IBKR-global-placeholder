services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      # Auto-restart gateway weekly to avoid IBKR's forced-logout timer
      TIME_ZONE: UTC
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
      READ_ONLY_API: "no"
    ports:
      # Expose socat ports — paper 4004, live 4003
      - "4003:4003"
      - "4004:4004"
    volumes:
      - ib-gateway-settings:/home/ibgateway/Jts
    restart: unless-stopped

  rsi-bot:
    build: .
    container_name: rsi-bot
    depends_on:
      - ib-gateway
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      IB_GATEWAY_HOST: ib-gateway
      IB_GATEWAY_PORT: ${IB_GATEWAY_PORT:-4004}
      IB_CLIENT_ID: ${IB_CLIENT_ID:-10}
      IB_MARKET_DATA: ${IB_MARKET_DATA:-delayed}
      DAILY_RESET_TZ: ${DAILY_RESET_TZ:-America/New_York}
      RESET_MAX_DD: ${RESET_MAX_DD:-}
      BOT_STATE_FILE: /app/state/bot_state.json
      ADOPT_ORPHAN: ${ADOPT_ORPHAN:-}
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK:-}
      # Dashboard (R11)
      PORT: ${PORT:-8000}
      DASHBOARD_HOST: ${DASHBOARD_HOST:-0.0.0.0}
      DASHBOARD_AUTH_TOKEN: ${DASHBOARD_AUTH_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - rsi-bot-state:/app/state
    restart: unless-stopped

volumes:
  ib-gateway-settings:
  rsi-bot-state:
